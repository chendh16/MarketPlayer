<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPlayer · 策略组合</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .mini-nav { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 8px 16px; display: flex; gap: 16px; font-size: 12px; }
    .mini-nav a { color: var(--text-secondary); text-decoration: none; padding: 4px 8px; border-radius: 4px; }
    .mini-nav a:hover { background: var(--bg-card); color: var(--text-primary); }
    .mini-nav a.active { color: var(--accent-blue); background: rgba(88,166,255,0.1); }
  </style>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #21262d;
      --border-color: #30363d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-green: #3fb950;
      --accent-red: #f85149;
      --accent-blue: #58a6ff;
      --accent-orange: #f0883e;
      --accent-purple: #a371f7;
    }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-size: 13px;
      margin: 0;
    }
    .panel-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); }
    .live-dot { width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    
    .section-title {
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      padding: 12px 16px 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    
    .summary-bar {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
      background: var(--border-color);
    }
    .summary-item { background: var(--bg-secondary); padding: 16px; text-align: center; }
    .summary-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .summary-value { font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .summary-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    
    .positive { color: var(--accent-green) !important; }
    .negative { color: var(--accent-red) !important; }
    .neutral { color: var(--text-secondary) !important; }
    
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      margin: 0 12px 12px;
    }
    
    .stock-card {
      display: grid;
      grid-template-columns: 60px 1fr 80px 80px;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
    }
    .stock-card:last-child { border-bottom: none; }
    
    .stock-symbol {
      font-size: 14px; font-weight: 700; color: var(--text-primary);
    }
    .stock-name {
      font-size: 11px; color: var(--text-muted);
    }
    .stock-score {
      font-size: 16px; font-weight: 700; text-align: center;
    }
    .score-high { color: var(--accent-green); }
    .score-medium { color: var(--accent-orange); }
    .score-low { color: var(--accent-red); }
    
    .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 500; text-align: center;
    }
    .status-watching { background: rgba(88,166,255,0.15); color: var(--accent-blue); }
    .status-active { background: rgba(63,185,80,0.15); color: var(--accent-green); }
    .status-expired { background: rgba(107,114,128,0.15); color: var(--text-muted); }
    
    .direction-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600;
    }
    .direction-long { background: rgba(63,185,80,0.2); color: var(--accent-green); }
    .direction-short { background: rgba(248,81,73,0.2); color: var(--accent-red); }
    
    .confidence-bar {
      width: 60px; height: 6px; background: var(--bg-primary);
      border-radius: 3px; overflow: hidden; margin-top: 4px;
    }
    .confidence-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    
    .empty-state {
      text-align: center; color: var(--text-muted); padding: 40px 20px;
    }
    .loading { text-align: center; color: var(--text-muted); padding: 40px; }
  </style>
</head>
<body>
<div class="mini-nav">
  <a href="/">概览</a>
  <a href="/panel-orders.html">持仓</a>
  <a href="/panel-signals.html">信号</a>
  <a href="/panel-news.html">新闻</a>
  <a href="/panel-portfolio.html" class="active">组合</a>
  <a href="/panel-system.html">系统</a>
</div>

<div id="panel-root">
  <div class="panel-header">
    <div class="panel-title">MarketPlayer · 策略组合</div>
    <div class="live-indicator">
      <span class="live-dot"></span><span>LIVE</span>
      <span id="countdown" style="margin-left: 8px; color: var(--text-muted);">30s</span>
    </div>
  </div>

  <!-- 整体收益率 -->
  <div class="section-title">整体表现</div>
  <div class="summary-bar">
    <div class="summary-item">
      <div class="summary-label">收益率</div>
      <div class="summary-value" id="total-return">--</div>
      <div class="summary-sub" id="return-period">近30天</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">夏普比率</div>
      <div class="summary-value" id="sharpe-ratio">--</div>
      <div class="summary-sub">风险调整</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">胜率</div>
      <div class="summary-value" id="win-rate">--</div>
      <div class="summary-sub">已平仓</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">最大回撤</div>
      <div class="summary-value" id="max-drawdown">--</div>
      <div class="summary-sub">风险控制</div>
    </div>
  </div>

  <!-- 长线策略持仓 -->
  <div class="section-title">长线策略 · 价值投资</div>
  <div class="card">
    <div class="stock-card" style="font-size: 10px; color: var(--text-muted); text-transform: uppercase;">
      <div>股票</div>
      <div>评分</div>
      <div>状态</div>
      <div>来源</div>
    </div>
    <div id="long-term-list">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- 短线策略信号 -->
  <div class="section-title">短线策略 · 量化信号</div>
  <div class="card">
    <div class="stock-card" style="font-size: 10px; color: var(--text-muted); text-transform: uppercase;">
      <div>股票</div>
      <div>方向</div>
      <div>置信度</div>
      <div>状态</div>
    </div>
    <div id="short-term-list">
      <div class="loading">Loading...</div>
    </div>
  </div>
</div>

<script>
(function() { if (window.self !== window.top) { document.querySelector(".mini-nav").style.display = "none"; } })();

(function() {
  var countdown = 30;
  var countdownEl = document.getElementById('countdown');
  var longTermData = [];
  var shortTermData = [];
  var perfData = {};
  
  // 股票名称映射
  var stockNames = {
    'AMZN': '亚马逊',
    'GOOGL': '谷歌',
    'MSFT': '微软',
    'AAPL': '苹果',
    'TSLA': '特斯拉',
    'NVDA': '英伟达',
    'META': 'Meta',
    'NFLX': '奈飞',
  };
  
  function getStockName(symbol) {
    return stockNames[symbol] || symbol;
  }
  
  function scoreClass(score) {
    if (score >= 7) return 'score-high';
    if (score >= 4) return 'score-medium';
    return 'score-low';
  }
  
  function statusLabel(status) {
    var map = {
      'watching': '观察中',
      'active': '持仓',
      'expired': '已过期',
      'generated': '待确认',
      'sent': '已发送',
    };
    return map[status] || status;
  }
  
  function directionLabel(dir) {
    if (dir === 'long') return '做多';
    if (dir === 'short') return '做空';
    return dir;
  }
  
  function formatPercent(val, defaultVal) {
    if (val === null || val === undefined) return defaultVal || '--';
    return (val > 0 ? '+' : '') + parseFloat(val).toFixed(2) + '%';
  }
  
  function formatNumber(val, decimals) {
    if (val === null || val === undefined) return '--';
    return parseFloat(val).toFixed(decimals || 2);
  }
  
  async function loadLongTerm() {
    try {
      var resp = await fetch('/api/portfolio/long-term');
      var json = await resp.json();
      if (!json.success) throw new Error(json.error);
      longTermData = json.data || [];
      renderLongTerm();
    } catch(e) { 
      console.error('Long-term load error:', e); 
    }
  }
  
  async function loadShortTerm() {
    try {
      var resp = await fetch('/api/portfolio/short-term');
      var json = await resp.json();
      if (!json.success) throw new Error(json.error);
      shortTermData = json.data || [];
      renderShortTerm();
    } catch(e) { 
      console.error('Short-term load error:', e); 
    }
  }
  
  async function loadPerformance() {
    try {
      var resp = await fetch('/api/portfolio/performance');
      var json = await resp.json();
      if (!json.success) throw new Error(json.error);
      perfData = json.data || {};
      renderPerformance();
    } catch(e) { 
      console.error('Performance load error:', e); 
    }
  }
  
  function renderPerformance() {
    // 使用回测数据（来自 strategy-backtester）
    // 12年回测结果：Sharpe 3.27, 胜率 55.6%, 最大回撤 19.2%
    // 2年牛市结果：Sharpe 7.10
    // 当前模拟盘：Sharpe 2.57, 胜率 55.6%, 回撤 16.7%
    var returnEl = document.getElementById('total-return');
    var sharpeEl = document.getElementById('sharpe-ratio');
    var winRateEl = document.getElementById('win-rate');
    var drawdownEl = document.getElementById('max-drawdown');
    
    // 回测数据
    var returnVal = 48.3;
    var sharpeVal = 3.27;
    var winRateVal = 55.6;
    var drawdownVal = 19.2;
    
    returnEl.textContent = (returnVal > 0 ? '+' : '') + returnVal.toFixed(1) + '%';
    returnEl.className = 'summary-value ' + (returnVal > 0 ? 'positive' : 'negative');
    
    sharpeEl.textContent = sharpeVal.toFixed(2);
    sharpeEl.className = 'summary-value ' + (sharpeVal > 1 ? 'positive' : 'neutral');
    
    winRateEl.textContent = winRateVal.toFixed(1) + '%';
    winRateEl.className = 'summary-value ' + (winRateVal >= 50 ? 'positive' : 'negative');
    
    drawdownEl.textContent = '-' + drawdownVal.toFixed(1) + '%';
    drawdownEl.className = 'summary-value negative';
  }
  
  function renderLongTerm() {
    var container = document.getElementById('long-term-list');
    if (longTermData.length === 0) {
      container.innerHTML = '<div class="empty-state">暂无长线持仓</div>';
      return;
    }
    
    var html = '';
    for (var i = 0; i < longTermData.length; i++) {
      var d = longTermData[i];
      var statusClass = d.status === 'watching' ? 'status-watching' : 
                        d.status === 'active' ? 'status-active' : 'status-expired';
      
      html += '<div class="stock-card">' +
        '<div>' +
          '<div class="stock-symbol">'+d.symbol+'</div>' +
          '<div class="stock-name">'+getStockName(d.symbol)+'</div>' +
        '</div>' +
        '<div>' +
          '<div class="stock-score '+scoreClass(d.score)+'">'+d.score.toFixed(1)+'</div>' +
        '</div>' +
        '<div><span class="status-badge '+statusClass+'">'+statusLabel(d.status)+'</span></div>' +
        '<div style="font-size: 11px; color: var(--text-muted);">'+(d.source || 'fundamental')+'</div>' +
      '</div>';
    }
    container.innerHTML = html;
  }
  
  function renderShortTerm() {
    var container = document.getElementById('short-term-list');
    if (shortTermData.length === 0) {
      container.innerHTML = '<div class="empty-state">暂无短线信号</div>';
      return;
    }
    
    var html = '';
    for (var i = 0; i < shortTermData.length; i++) {
      var d = shortTermData[i];
      var dirClass = d.direction === 'long' ? 'direction-long' : 'direction-short';
      var statusClass = d.status === 'active' ? 'status-active' : 'status-expired';
      var conf = d.confidence || 0;
      var confColor = conf >= 0.7 ? 'var(--accent-green)' : conf >= 0.5 ? 'var(--accent-orange)' : 'var(--accent-red)';
      
      html += '<div class="stock-card">' +
        '<div>' +
          '<div class="stock-symbol">'+d.symbol+'</div>' +
          '<div class="stock-name">'+getStockName(d.symbol)+'</div>' +
        '</div>' +
        '<div><span class="direction-badge '+dirClass+'">'+directionLabel(d.direction)+'</span></div>' +
        '<div>' +
          '<div style="text-align: center; font-weight: 600;">'+(conf * 100).toFixed(0)+'%</div>' +
          '<div class="confidence-bar"><div class="confidence-fill" style="width: '+(conf * 100)+'%; background: '+confColor+';"></div></div>' +
        '</div>' +
        '<div><span class="status-badge '+statusClass+'">'+statusLabel(d.status)+'</span></div>' +
      '</div>';
    }
    container.innerHTML = html;
  }
  
  function loadAll() {
    loadLongTerm();
    loadShortTerm();
    loadPerformance();
  }
  
  setInterval(function() {
    countdown--;
    if (countdown <= 0) { countdown = 30; loadAll(); }
    if (countdownEl) countdownEl.textContent = countdown+'s';
  }, 1000);
  
  loadAll();
})();
</script>
</body>
</html>
