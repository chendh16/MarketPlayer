<div id="system-panel-root" class="space-y-6">

  <!-- KPI Cards Row -->
  <div class="grid grid-cols-3 gap-4">
    <!-- Today Cost -->
    <div id="sys-kpi-today-cost" class="rounded-xl border p-5 bg-green-50 border-green-200 transition-colors">
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">今日花费</div>
      <div id="sys-val-today-cost" class="text-3xl font-bold text-gray-800">--</div>
      <div class="text-xs text-gray-500 mt-1">USD</div>
    </div>

    <!-- Today Call Count -->
    <div class="rounded-xl border border-gray-200 p-5 bg-white">
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">今日调用次数</div>
      <div id="sys-val-today-calls" class="text-3xl font-bold text-gray-800">--</div>
      <div class="text-xs text-gray-500 mt-1">次</div>
    </div>

    <!-- Month Cost -->
    <div class="rounded-xl border border-gray-200 p-5 bg-white">
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">本月花费</div>
      <div id="sys-val-month-cost" class="text-3xl font-bold text-gray-800">--</div>
      <div class="text-xs text-gray-500 mt-1">USD（<span id="sys-val-month-calls">--</span> 次调用）</div>
    </div>
  </div>

  <!-- Call Type Breakdown -->
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
      <h3 class="text-sm font-semibold text-gray-700">今日调用类型明细</h3>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">类型</th>
            <th class="px-5 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide">次数</th>
            <th class="px-5 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide">花费</th>
          </tr>
        </thead>
        <tbody id="sys-calltype-body">
          <tr>
            <td colspan="3" class="px-5 py-6 text-center text-gray-400 text-sm">加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- System Health -->
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <div class="px-5 py-3 border-b border-gray-100">
      <h3 class="text-sm font-semibold text-gray-700">系统状态</h3>
    </div>
    <div class="p-5 grid grid-cols-2 gap-4">
      <div class="flex items-start gap-3">
        <div id="sys-health-dot" class="mt-0.5 w-3 h-3 rounded-full bg-gray-300 flex-shrink-0"></div>
        <div>
          <div class="text-sm font-medium text-gray-700">API 状态</div>
          <div id="sys-health-label" class="text-xs text-gray-500 mt-0.5">检测中...</div>
        </div>
      </div>
      <div>
        <div class="text-xs text-gray-500 mb-1">最后检查时间</div>
        <div id="sys-health-check-time" class="text-sm font-medium text-gray-700">--</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="flex items-center justify-between text-xs text-gray-500">
    <span>最后刷新：<span id="sys-last-refresh">--</span></span>
    <button
      onclick="window.loadSystemPanel()"
      class="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-colors text-xs font-medium"
    >刷新</button>
  </div>

</div>

<script>
(function () {
  /* ── 工具函数 ── */
  function fmtTime(iso) {
    if (!iso) return '--';
    const d = new Date(iso);
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const HH = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return mm + '-' + dd + ' ' + HH + ':' + min;
  }

  function fmtCost(val) {
    const n = parseFloat(val) || 0;
    return '$' + n.toFixed(4);
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── KPI 卡片颜色 ── */
  function todayCostClass(usd) {
    const n = parseFloat(usd) || 0;
    if (n >= 5) return { bg: 'bg-red-50', border: 'border-red-200' };
    if (n >= 1) return { bg: 'bg-yellow-50', border: 'border-yellow-200' };
    return { bg: 'bg-green-50', border: 'border-green-200' };
  }

  /* ── 渲染成本数据 ── */
  function renderCosts(data) {
    const today = data.today || {};
    const month = data.thisMonth || {};
    const byType = Array.isArray(data.byCallType) ? data.byCallType : [];

    const todayCost = today.total_cost_usd || '0';
    const todayCalls = today.call_count || 0;
    const monthCost = month.total_cost_usd || '0';
    const monthCalls = month.call_count || 0;

    /* KPI values */
    document.getElementById('sys-val-today-cost').textContent = fmtCost(todayCost);
    document.getElementById('sys-val-today-calls').textContent = todayCalls;
    document.getElementById('sys-val-month-cost').textContent = fmtCost(monthCost);
    document.getElementById('sys-val-month-calls').textContent = monthCalls;

    /* KPI card background */
    const cls = todayCostClass(todayCost);
    const card = document.getElementById('sys-kpi-today-cost');
    card.className = 'rounded-xl border p-5 transition-colors ' + cls.bg + ' ' + cls.border;

    /* Call type table */
    const tbody = document.getElementById('sys-calltype-body');
    if (!byType.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="px-5 py-6 text-center text-gray-400 text-sm">今日暂无调用记录</td></tr>';
      return;
    }

    const rows = byType.map(function (row) {
      const typeLabel = {
        analysis: '资讯分析',
        signal: '信号生成',
      }[row.call_type] || escHtml(row.call_type);

      return '<tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">'
        + '<td class="px-5 py-3 text-gray-700 font-medium">' + typeLabel + '</td>'
        + '<td class="px-5 py-3 text-right text-gray-600">' + (row.call_count || 0) + '</td>'
        + '<td class="px-5 py-3 text-right font-mono text-gray-700">' + fmtCost(row.total_cost_usd) + '</td>'
        + '</tr>';
    });

    tbody.innerHTML = rows.join('');
  }

  /* ── 渲染健康状态 ── */
  function renderHealth(ok, checkTime) {
    const dot = document.getElementById('sys-health-dot');
    const label = document.getElementById('sys-health-label');
    const checkEl = document.getElementById('sys-health-check-time');

    if (ok) {
      dot.className = 'mt-0.5 w-3 h-3 rounded-full bg-green-500 flex-shrink-0';
      label.className = 'text-xs text-green-600 mt-0.5 font-medium';
      label.textContent = '在线';
    } else {
      dot.className = 'mt-0.5 w-3 h-3 rounded-full bg-red-500 flex-shrink-0';
      label.className = 'text-xs text-red-600 mt-0.5 font-medium';
      label.textContent = '离线';
    }

    checkEl.textContent = checkTime ? fmtTime(checkTime) : fmtTime(new Date().toISOString());
  }

  /* ── 渲染成本区域错误 ── */
  function renderCostError(msg) {
    const tbody = document.getElementById('sys-calltype-body');
    tbody.innerHTML = '<tr><td colspan="3" class="px-5 py-4 text-center">'
      + '<div class="inline-flex items-center gap-2 bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-2 text-sm">'
      + '<span class="font-semibold">加载失败：</span>' + escHtml(msg)
      + '</div>'
      + '</td></tr>';
    document.getElementById('sys-val-today-cost').textContent = '--';
    document.getElementById('sys-val-today-calls').textContent = '--';
    document.getElementById('sys-val-month-cost').textContent = '--';
    document.getElementById('sys-val-month-calls').textContent = '--';
  }

  /* ── 主加载函数 ── */
  window.loadSystemPanel = async function () {
    /* Fetch cost and health in parallel */
    const [costsResult, healthResult] = await Promise.allSettled([
      (async function () {
        return await window.dashboardFetch('/api/admin/costs');
      })(),
      (async function () {
        const resp = await fetch('/api/health');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return await resp.json();
      })(),
    ]);

    /* Render costs */
    if (costsResult.status === 'fulfilled') {
      renderCosts(costsResult.value);
    } else {
      const errMsg = costsResult.reason && costsResult.reason.message
        ? costsResult.reason.message
        : '未知错误';
      renderCostError(errMsg);
    }

    /* Render health */
    if (healthResult.status === 'fulfilled') {
      const h = healthResult.value;
      renderHealth(h.status === 'ok', h.timestamp);
    } else {
      renderHealth(false, new Date().toISOString());
    }

    /* Last refresh timestamp */
    document.getElementById('sys-last-refresh').textContent = fmtTime(new Date().toISOString());
  };

  /* ── 自动刷新（60s）── */
  (function startAutoRefresh() {
    setInterval(function () {
      window.loadSystemPanel();
    }, 60000);
  })();

  /* ── 初始化 ── */
  window.loadSystemPanel();
})();
</script>
