<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPlayer · 系统状态</title>
  <style>
    .mini-nav { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 8px 16px; display: flex; gap: 16px; font-size: 12px; }
    .mini-nav a { color: var(--text-secondary); text-decoration: none; padding: 4px 8px; border-radius: 4px; }
    .mini-nav a:hover { background: var(--bg-card); color: var(--text-primary); }
    .mini-nav a.active { color: var(--accent-blue); background: rgba(88,166,255,0.1); }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #21262d;
      --border-color: #30363d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-green: #3fb950;
      --accent-red: #f85149;
      --accent-blue: #58a6ff;
      --accent-yellow: #d29922;
    }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-size: 13px;
      margin: 0;
    }
    .panel-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); }
    .live-dot { width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
      background: var(--border-color);
    }
    .stat-card { background: var(--bg-secondary); padding: 16px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--text-primary); }
    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .section { padding: 12px; }
    .section-title {
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }
    .logs-list { display: flex; flex-direction: column; gap: 6px; }
    .log-row {
      display: grid;
      grid-template-columns: 140px 80px 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 6px;
    }
    .log-time { font-size: 11px; color: var(--text-muted); }
    .agent-tag {
      display: inline-block; padding: 2px 8px; border-radius: 3px;
      font-size: 10px; font-weight: 500;
      background: rgba(110,118,129,0.2); color: var(--text-secondary);
    }
    .agent-system { background: rgba(88,166,255,0.2); color: var(--accent-blue); }
    .log-detail { font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cron-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
    }
    .cron-item {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 6px; padding: 12px;
    }
    .cron-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .cron-schedule { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .loading { text-align: center; color: var(--text-muted); padding: 20px; }
  </style>
</head>
<body>
<div class="mini-nav">
  <a href="/">概览</a>
  <a href="/panel-orders.html">持仓</a>
  <a href="/panel-signals.html">信号</a>
  <a href="/panel-news.html">新闻</a>
  <a href="/panel-system.html" class="active">系统</a>
</div>
<div id="panel-root">
  <div class="panel-header">
    <div class="panel-title">MarketPlayer · 系统状态</div>
    <div class="live-indicator">
      <span class="live-dot"></span><span>LIVE</span>
      <span id="countdown" style="margin-left: 8px; color: var(--text-muted);">30s</span>
    </div>
  </div>
  
  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-signals">--</div>
      <div class="stat-label">总信号</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-today-signals">--</div>
      <div class="stat-label">今日信号</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-news">--</div>
      <div class="stat-label">今日新闻</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="color: var(--accent-green);">●</div>
      <div class="stat-label">运行中</div>
    </div>
  </div>
  
  <!-- Agent Logs -->
  <div class="section">
    <div class="section-title">Agent 运行日志</div>
    <div class="logs-list" id="logs-list">
      <div class="loading">Loading...</div>
    </div>
  </div>
  
  <!-- Crontab -->
  <div class="section">
    <div class="section-title">定时任务</div>
    <div class="cron-grid">
      <div class="cron-item">
        <div class="cron-name">📡 事件扫描</div>
        <div class="cron-schedule">每5分钟执行</div>
      </div>
      <div class="cron-item">
        <div class="cron-name">📈 A股收盘触发</div>
        <div class="cron-schedule">工作日 15:30 CST</div>
      </div>
      <div class="cron-item">
        <div class="cron-name">📈 港股收盘触发</div>
        <div class="cron-schedule">工作日 16:00 HKT</div>
      </div>
      <div class="cron-item">
        <div class="cron-name">📈 美股收盘触发</div>
        <div class="cron-schedule">工作日 21:00 EST</div>
      </div>
      <div class="cron-item">
        <div class="cron-name">📊 周报复盘</div>
        <div class="cron-schedule">每周六 02:00 UTC</div>
      </div>
      <div class="cron-item">
        <div class="cron-name">📊 月度估值</div>
        <div class="cron-schedule">每月1日 01:00 UTC</div>
      </div>
    </div>
  </div>
</div>
<script>
(function() { if (window.self !== window.top) { document.querySelector(".mini-nav").style.display = "none"; } })();

(function() {
  var countdown = 30;
  var countdownEl = document.getElementById('countdown');
  
  async function loadStats() {
    try {
      var resp = await fetch('/api/dashboard/stats');
      var json = await resp.json();
      if (json.success) {
        document.getElementById('stat-signals').textContent = json.data.totalSignals || 0;
        document.getElementById('stat-today-signals').textContent = json.data.todaySignals || 0;
        document.getElementById('stat-news').textContent = json.data.todayNews || 0;
      }
    } catch(e) { console.error(e); }
  }
  
  async function loadLogs() {
    try {
      var resp = await fetch('/api/dashboard/system');
      var json = await resp.json();
      if (json.success) renderLogs(json.data);
    } catch(e) { console.error(e); }
  }
  
  function renderLogs(data) {
    if (!data || data.length === 0) {
      document.getElementById('logs-list').innerHTML = '<div class="loading">No logs</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < data.length; i++) {
      var log = data[i];
      var time = log.timestamp ? log.timestamp.substring(0, 16).replace('T', ' ') : '--';
      var agentClass = log.agent_id === 'system' ? 'agent-system' : '';
      html += '<div class="log-row">' +
        '<div class="log-time">'+time+'</div>' +
        '<div><span class="agent-tag '+agentClass+'">'+(log.agent_id || 'system')+'</span></div>' +
        '<div class="log-detail">'+(log.input_summary || log.output_summary || '-')+'</div>' +
      '</div>';
    }
    document.getElementById('logs-list').innerHTML = html;
  }
  
  setInterval(function() {
    countdown--;
    if (countdown <= 0) { countdown = 30; loadStats(); loadLogs(); }
    if (countdownEl) countdownEl.textContent = countdown+'s';
  }, 1000);
  
  loadStats();
  loadLogs();
})();
</script>
</body>
</html>
