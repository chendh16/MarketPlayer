<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPlayer · 持仓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #21262d;
      --border-color: #30363d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-green: #3fb950;
      --accent-red: #f85149;
      --accent-blue: #58a6ff;
    }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-size: 13px;
      margin: 0;
      padding: 0;
    }
    .mini-nav {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 8px 16px;
      display: flex;
      gap: 16px;
      font-size: 12px;
    }
    .mini-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .mini-nav a:hover { background: var(--bg-card); color: var(--text-primary); }
    .mini-nav a.active { color: var(--accent-blue); background: rgba(88,166,255,0.1); }
      }
      return token;
    }

    window.dashboardFetch = async function (url) {
      var token = getAdminToken();
      var headers = {};
      if (token) {
        headers['Authorization'] = 'Bearer ' + token;
      }
      var res = await fetch(url, { headers: headers });
      if (!res.ok) {
        var errorText = await res.text();
        throw new Error('HTTP ' + res.status + ': ' + errorText);
      }
      return res.json();
    };
  </script>
  <style>
    /* WorldMonitor 风格 - 暗色主题 */
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #21262d;
      --border-color: #30363d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-green: #3fb950;
      --accent-red: #f85149;
      --accent-blue: #58a6ff;
    }
    
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Droid Sans Mono', 'Source Code Pro', monospace;
      font-size: 13px;
      line-height: 1.4;
    }
    
    .panel-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    
    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--accent-green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    /* 汇总栏 */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border-color);
      border-bottom: 1px solid var(--border-color);
    }
    
    .summary-item {
      background: var(--bg-secondary);
      padding: 10px 12px;
      text-align: center;
    }
    
    .summary-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    
    .summary-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .summary-value.positive { color: var(--accent-green); }
    .summary-value.negative { color: var(--accent-red); }
    
    /* 持仓卡片网格 */
    .positions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      padding: 12px;
    }
    
    .position-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 12px;
    }
    
    .card-left {
      grid-row: 1 / 3;
    }
    
    .card-right {
      grid-row: 1 / 3;
      text-align: right;
    }
    
    .card-center {
      grid-column: 1 / -1;
    }
    
    .stock-code {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }
    
    .stock-name {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    
    .stock-qty {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
    }
    
    .stock-cost {
      font-size: 11px;
      color: var(--text-muted);
    }
    
    .market-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .pl-percent {
      font-size: 14px;
      font-weight: 600;
      margin-top: 4px;
    }
    
    .pl-percent.positive { color: var(--accent-green); }
    .pl-percent.negative { color: var(--accent-red); }
    
    .pl-amount {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    
    /* Sparkline */
    .sparkline {
      width: 80px;
      height: 32px;
      margin-top: 8px;
    }
    
    .sparkline-path {
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    .sparkline-area {
      opacity: 0.1;
    }
    
    /* 订单区域 */
    .orders-section {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 12px;
    }
    
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    
    .orders-table th {
      text-align: left;
      padding: 8px;
      color: var(--text-muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border-color);
    }
    
    .orders-table td {
      padding: 8px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-secondary);
    }
    
    .status-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
    }
    
    .status-filled { background: rgba(63, 185, 80, 0.2); color: var(--accent-green); }
    .status-failed { background: rgba(248, 81, 73, 0.2); color: var(--accent-red); }
    .status-pending { background: rgba(88, 166, 255, 0.2); color: var(--accent-blue); }
  </style>
</head>
<body>
<div class="mini-nav">
  <a href="/">概览</a>
  <a href="/panel-orders.html" class="active">持仓</a>
  <a href="/panel-signals.html">信号</a>
  <a href="/panel-news.html">新闻</a>
  <a href="/panel-system.html">系统</a>
</div>
<div id="orders-panel-root">
  
  <!-- 顶部标题栏 -->
  <div class="panel-header">
    <div class="panel-title">富途模拟盘 · 持仓实时监控</div>
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span>LIVE</span>
      <span id="countdown" style="margin-left: 8px; color: var(--text-muted);">30s</span>
    </div>
  </div>
  
  <!-- 汇总栏 -->
  <div class="summary-bar">
    <div class="summary-item">
      <div class="summary-label">总市值</div>
      <div class="summary-value" id="summary-total-value">--</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">今日盈亏</div>
      <div class="summary-value" id="summary-today-pl">--</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">总盈亏%</div>
      <div class="summary-value" id="summary-total-pl">--</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">持仓数量</div>
      <div class="summary-value" id="summary-position-count">--</div>
    </div>
  </div>
  
  <!-- 持仓卡片网格 -->
  <div class="positions-grid" id="positions-grid">
    <div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 40px;">
      Loading positions...
    </div>
  </div>
  
  <!-- 订单列表 -->
  <div class="orders-section">
    <div class="section-title">最近订单</div>
    <table class="orders-table">
      <thead>
        <tr>
          <th>时间</th>
          <th>代码</th>
          <th>方向</th>
          <th>数量</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody id="orders-table-body">
        <tr><td colspan="5" style="text-align: center; color: var(--text-muted);">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
(function() { if (window.self !== window.top) { document.querySelector(".mini-nav").style.display = "none"; } })();

(function () {
  'use strict';
  
  // 生成随机 sparkline 数据
  function generateSparkline() {
    var points = [];
    var base = 100 + Math.random() * 20 - 10;
    var current = base;
    for (var i = 0; i < 7; i++) {
      current += (Math.random() - 0.5) * 10;
      points.push(current);
    }
    var min = Math.min(...points);
    var max = Math.max(...points);
    var range = max - min || 1;
    var width = 80;
    var height = 32;
    var padding = 2;
    
    var pathD = '';
    var areaD = 'M ';
    for (var i = 0; i < points.length; i++) {
      var x = padding + (i / (points.length - 1)) * (width - padding * 2);
      var y = height - padding - ((points[i] - min) / range) * (height - padding * 2);
      pathD += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
      areaD += x + ',' + y + ' ';
    }
    areaD += 'L ' + (width - padding) + ',' + (height - padding) + ' L ' + padding + ',' + (height - padding) + ' Z';
    
    var isUp = points[points.length - 1] >= points[0];
    var color = isUp ? '#3fb950' : '#f85149';
    
    return {
      path: pathD,
      area: areaD,
      stroke: color,
      fill: color
    };
  }
  
  // 格式化数字
  function fmtNum(n, decimals) {
    if (n === null || n === undefined || isNaN(n)) return '--';
    return n.toFixed(decimals);
  }
  
  // 格式化金额
  function fmtMoney(n) {
    if (n === null || n === undefined || isNaN(n)) return '--';
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  
  // 加载持仓数据
  var refreshCountdown = 30;
  var countdownEl = document.getElementById('countdown');
  
  async function loadPositions() {
    try {
      var resp = await fetch('/api/futu/positions');
      var json = await resp.json();
      
      if (!json.success || !json.data || json.data.length === 0) {
        document.getElementById('positions-grid').innerHTML = 
          '<div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 40px;">No positions</div>';
        return;
      }
      
      var positions = json.data;
      var html = '';
      var totalValue = 0;
      var totalPl = 0;
      var todayPl = 0;
      
      for (var i = 0; i < positions.length; i++) {
        var pos = positions[i];
        var qty = parseFloat(pos.qty) || 0;
        var cost = parseFloat(pos.cost_price) || 0;
        var value = parseFloat(pos.market_val) || 0;
        var plRatio = parseFloat(pos.pl_ratio) || 0;
        var plVal = parseFloat(pos.pl_val) || 0;
        
        totalValue += value;
        totalPl += plVal;
        
        var isPositive = plRatio >= 0;
        var sparkline = generateSparkline();
        
        html += '<div class="position-card">' +
          '<div class="card-left">' +
            '<div class="stock-code">' + pos.code.replace('US.', '') + '</div>' +
            '<div class="stock-name">' + pos.stock_name + '</div>' +
            '<div class="stock-qty">' + qty + ' 股</div>' +
            '<div class="stock-cost">成本 $' + cost.toFixed(2) + '</div>' +
          '</div>' +
          '<div class="card-right">' +
            '<div class="market-value">' + fmtMoney(value) + '</div>' +
            '<div class="pl-percent ' + (isPositive ? 'positive' : 'negative') + '">' + 
              (isPositive ? '+' : '') + plRatio.toFixed(2) + '%</div>' +
            '<div class="pl-amount">' + fmtMoney(plVal) + '</div>' +
          '</div>' +
          '<div class="card-center">' +
            '<svg class="sparkline" viewBox="0 0 80 32">' +
              '<path class="sparkline-area" d="' + sparkline.area + '" fill="' + sparkline.fill + '"/>' +
              '<path class="sparkline-path" d="' + sparkline.path + '" stroke="' + sparkline.stroke + '"/>' +
            '</svg>' +
          '</div>' +
        '</div>';
      }
      
      document.getElementById('positions-grid').innerHTML = html;
      
      // 更新汇总栏
      document.getElementById('summary-total-value').textContent = fmtMoney(totalValue);
      
      var totalRatio = totalValue > 0 ? (totalPl / (totalValue - totalPl)) * 100 : 0;
      var totalPlEl = document.getElementById('summary-total-pl');
      totalPlEl.textContent = (totalPl >= 0 ? '+' : '') + totalRatio.toFixed(2) + '%';
      totalPlEl.className = 'summary-value ' + (totalPl >= 0 ? 'positive' : 'negative');
      
      document.getElementById('summary-position-count').textContent = positions.length + ' 只';
      
    } catch (err) {
      console.error('[positions] error:', err);
    }
  }
  
  // 倒计时
  setInterval(function() {
    refreshCountdown--;
    if (refreshCountdown <= 0) {
      refreshCountdown = 30;
      loadPositions();
    }
    if (countdownEl) countdownEl.textContent = refreshCountdown + 's';
  }, 1000);
  
  // 初始加载
  loadPositions();
  
  // 加载订单列表（无认证）
  async function loadOrders() {
    try {
      var resp = await fetch('/api/futu/orders');
      var json = await resp.json();
      
      if (!json.success || !json.data || json.data.length === 0) {
        document.getElementById('orders-table-body').innerHTML = 
          '<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No orders</td></tr>';
        return;
      }
      
      var html = '';
      for (var i = 0; i < json.data.length; i++) {
        var order = json.data[i];
        var isBuy = order.trd_side === 'BUY' || order.trd_side === 'buy';
        var statusClass = '';
        var statusText = order.order_status || 'UNKNOWN';
        
        if (statusText.includes('FILLED')) statusClass = 'status-filled';
        else if (statusText.includes('FAILED') || statusText.includes('CANCEL')) statusClass = 'status-failed';
        else statusClass = 'status-pending';
        
        var time = order.create_time ? order.create_time.substring(0, 16) : '--';
        
        html += '<tr>' +
          '<td style="color: var(--text-muted);">' + time + '</td>' +
          '<td style="color: var(--text-primary);">' + (order.code || '').replace('US.', '') + '</td>' +
          '<td style="color: ' + (isBuy ? 'var(--accent-green)' : 'var(--accent-red)') + ';">' + 
            (isBuy ? '买入' : '卖出') + '</td>' +
          '<td>' + (order.qty || order.dealt_qty || '--') + '</td>' +
          '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
        '</tr>';
      }
      
      document.getElementById('orders-table-body').innerHTML = html;
      
    } catch (err) {
      console.error('[orders] error:', err);
      document.getElementById('orders-table-body').innerHTML = 
        '<tr><td colspan="5" style="text-align: center; color: var(--accent-red);">Load failed</td></tr>';
    }
  }
  
  loadOrders();
})();
</script>
</body>
</html>
