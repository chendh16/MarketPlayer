<div id="orders-panel-root" class="p-6">

  <!-- Top stat bar -->
  <div id="orders-stats-bar" class="grid grid-cols-4 gap-4 mb-6">
    <div class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col gap-1 shadow-sm">
      <span class="text-xs text-gray-400 font-medium uppercase tracking-wide">Total Orders</span>
      <span id="stat-orders-total" class="text-2xl font-bold text-gray-800">--</span>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col gap-1 shadow-sm">
      <span class="text-xs text-gray-400 font-medium uppercase tracking-wide">Filled</span>
      <span id="stat-orders-filled" class="text-2xl font-bold text-green-600">--</span>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col gap-1 shadow-sm">
      <span class="text-xs text-gray-400 font-medium uppercase tracking-wide">Failed</span>
      <span id="stat-orders-failed" class="text-2xl font-bold text-red-500">--</span>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col gap-1 shadow-sm">
      <span class="text-xs text-gray-400 font-medium uppercase tracking-wide">In Progress</span>
      <span id="stat-orders-pending" class="text-2xl font-bold text-blue-500">--</span>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="flex items-center gap-2 mb-5 flex-wrap">
    <span class="text-sm text-gray-500 font-medium mr-1">Status:</span>
    <button id="orders-filter-all"         onclick="ordersSetFilter('all')"           class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-800 text-white transition-colors">All</button>
    <button id="orders-filter-filled"      onclick="ordersSetFilter('filled')"        class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">Filled</button>
    <button id="orders-filter-submitted"   onclick="ordersSetFilter('submitted')"     class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">Submitted</button>
    <button id="orders-filter-failed"      onclick="ordersSetFilter('failed')"        class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">Failed</button>
    <button id="orders-filter-cancelled"   onclick="ordersSetFilter('cancelled')"     class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">Cancelled</button>
    <div class="ml-auto flex items-center gap-2">
      <span id="orders-refresh-indicator" class="text-xs text-gray-400 hidden">Refreshing...</span>
      <button
        onclick="window.loadOrdersPanel()"
        class="px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors"
      >Refresh</button>
    </div>
  </div>

  <!-- Table wrapper -->
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-200">
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Time</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">User</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Symbol</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Direction</th>
            <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Qty</th>
            <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Ref Price</th>
            <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Exec Price</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Status</th>
            <th class="text-center px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Retries</th>
          </tr>
        </thead>
        <tbody id="orders-table-body">
          <tr>
            <td colspan="9" class="text-center text-gray-400 py-12 text-sm">Loading orders...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Error message -->
  <div id="orders-error" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm"></div>

</div>

<script>
(function () {
  // ── State ──────────────────────────────────────────────────────────────────
  let _ordersData = [];
  let _ordersFilter = 'all';
  let _ordersTimer = null;
  const _expandedOrderIds = new Set();

  // ── Helpers ────────────────────────────────────────────────────────────────
  function fmtDate(iso) {
    if (!iso) return '--';
    const d = new Date(iso);
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${mm}-${dd} ${hh}:${min}`;
  }

  function fmtPrice(val) {
    if (val === null || val === undefined || val === '') return '-';
    const num = parseFloat(val);
    if (isNaN(num)) return '-';
    return `$${num.toFixed(2)}`;
  }

  function statusBadge(status) {
    const map = {
      filled:         'bg-green-100 text-green-700',
      submitted:      'bg-blue-100 text-blue-700',
      failed:         'bg-red-100 text-red-700',
      cancelled:      'bg-gray-100 text-gray-500',
      partial_filled: 'bg-yellow-100 text-yellow-700',
    };
    const cls = map[status] || 'bg-gray-100 text-gray-500';
    return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold ${cls}">${status || '--'}</span>`;
  }

  function directionBadge(direction) {
    const isBuy = direction === 'buy' || direction === 'long';
    return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold ${
      isBuy ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
    }">${(direction || '--').toUpperCase()}</span>`;
  }

  function marketBadge(market) {
    const map = {
      us:  'bg-blue-100 text-blue-700',
      hk:  'bg-purple-100 text-purple-700',
      a:   'bg-orange-100 text-orange-700',
      btc: 'bg-yellow-100 text-yellow-700',
    };
    const cls = map[market] || 'bg-gray-100 text-gray-600';
    return `<span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-semibold ${cls}">${(market || '').toUpperCase()}</span>`;
  }

  function retryBadge(count) {
    if (!count || count === 0) return '<span class="text-gray-300">0</span>';
    return `<span class="text-orange-500 font-semibold">${count}</span>`;
  }

  function filterOrders(data) {
    if (_ordersFilter === 'all') return data;
    return data.filter(o => o.status === _ordersFilter);
  }

  // ── Stats ──────────────────────────────────────────────────────────────────
  function renderStats(data) {
    const total = data.length;
    const filled = data.filter(o => o.status === 'filled').length;
    const failed = data.filter(o => o.status === 'failed').length;
    const inProgress = data.filter(o => o.status === 'submitted' || o.status === 'partial_filled').length;

    document.getElementById('stat-orders-total').textContent = total;
    document.getElementById('stat-orders-filled').textContent = filled;
    document.getElementById('stat-orders-failed').textContent = failed;
    document.getElementById('stat-orders-pending').textContent = inProgress;
  }

  // ── Table render ───────────────────────────────────────────────────────────
  function renderTable(data) {
    const tbody = document.getElementById('orders-table-body');
    const filtered = filterOrders(data);

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9" class="text-center text-gray-400 py-12 text-sm">No orders found.</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(o => {
      const hasError = !!(o.failure_message || o.failure_type);
      const expanded = _expandedOrderIds.has(o.id);
      const rowHoverClass = hasError ? 'cursor-pointer hover:bg-red-50' : 'hover:bg-gray-50';
      const expandAttr = hasError
        ? `onclick="ordersToggleRow('${o.id}')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')ordersToggleRow('${o.id}')"`
        : '';

      const mainRow = `
        <tr class="border-b border-gray-100 transition-colors ${rowHoverClass}" ${expandAttr}>
          <td class="px-4 py-3 text-gray-500 whitespace-nowrap text-xs">${fmtDate(o.created_at)}</td>
          <td class="px-4 py-3 text-gray-700 whitespace-nowrap max-w-[120px] truncate" title="${o.discord_username || ''}">${o.discord_username || '--'}</td>
          <td class="px-4 py-3 whitespace-nowrap">
            <div class="flex items-center gap-1.5">
              <span class="font-semibold text-gray-800">${o.symbol || '--'}</span>
              ${marketBadge(o.market)}
            </div>
          </td>
          <td class="px-4 py-3 whitespace-nowrap">${directionBadge(o.direction)}</td>
          <td class="px-4 py-3 text-right text-gray-700 whitespace-nowrap font-medium">${o.quantity ?? '--'}</td>
          <td class="px-4 py-3 text-right text-gray-500 whitespace-nowrap">${fmtPrice(o.reference_price)}</td>
          <td class="px-4 py-3 text-right whitespace-nowrap font-medium ${o.executed_price ? 'text-gray-800' : 'text-gray-300'}">${fmtPrice(o.executed_price)}</td>
          <td class="px-4 py-3 whitespace-nowrap">
            <div class="flex items-center gap-1.5">
              ${statusBadge(o.status)}
              ${hasError ? '<svg class="w-3 h-3 text-red-400 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>' : ''}
            </div>
          </td>
          <td class="px-4 py-3 text-center whitespace-nowrap">${retryBadge(o.retry_count)}</td>
        </tr>
      `;

      const errorRow = (hasError && expanded) ? `
        <tr class="bg-red-50 border-b border-red-100">
          <td colspan="9" class="px-4 py-3">
            <div class="text-xs">
              ${o.failure_type ? `<span class="inline-flex items-center px-2 py-0.5 rounded bg-red-100 text-red-600 font-semibold mr-2">${o.failure_type}</span>` : ''}
              <span class="text-red-700">${o.failure_message || 'No error details available.'}</span>
            </div>
          </td>
        </tr>
      ` : '';

      return mainRow + errorRow;
    }).join('');
  }

  // ── Filter button states ───────────────────────────────────────────────────
  function ordersSetFilter(filter) {
    _ordersFilter = filter;
    const statuses = ['all', 'filled', 'submitted', 'failed', 'cancelled'];
    statuses.forEach(s => {
      const btn = document.getElementById(`orders-filter-${s}`);
      if (!btn) return;
      if (s === filter) {
        btn.className = 'px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-800 text-white transition-colors';
      } else {
        btn.className = 'px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors';
      }
    });
    renderTable(_ordersData);
  }

  // ── Toggle error row expand ────────────────────────────────────────────────
  function ordersToggleRow(id) {
    if (_expandedOrderIds.has(id)) {
      _expandedOrderIds.delete(id);
    } else {
      _expandedOrderIds.add(id);
    }
    renderTable(_ordersData);
  }

  // ── Main fetch ─────────────────────────────────────────────────────────────
  async function loadOrdersPanel() {
    const indicator = document.getElementById('orders-refresh-indicator');
    const errorEl = document.getElementById('orders-error');
    if (indicator) indicator.classList.remove('hidden');
    if (errorEl) errorEl.classList.add('hidden');

    try {
      const data = await window.dashboardFetch('/api/admin/orders?limit=100');
      _ordersData = Array.isArray(data) ? data : [];
      renderStats(_ordersData);
      renderTable(_ordersData);
    } catch (err) {
      console.error('[orders panel]', err);
      if (errorEl) {
        errorEl.textContent = `Failed to load orders: ${err.message || 'Unknown error'}`;
        errorEl.classList.remove('hidden');
      }
    } finally {
      if (indicator) indicator.classList.add('hidden');
    }
  }

  // ── Auto-refresh ───────────────────────────────────────────────────────────
  function startOrdersAutoRefresh() {
    if (_ordersTimer) clearInterval(_ordersTimer);
    _ordersTimer = setInterval(() => {
      window.loadOrdersPanel();
    }, 30000);
  }

  // ── Expose globals ─────────────────────────────────────────────────────────
  window.loadOrdersPanel = loadOrdersPanel;
  window.ordersSetFilter = ordersSetFilter;
  window.ordersToggleRow = ordersToggleRow;

  // ── Init ───────────────────────────────────────────────────────────────────
  loadOrdersPanel();
  startOrdersAutoRefresh();
})();
</script>
