<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketPlayer · 信号实时监控</title>
  <style>
    .mini-nav { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 8px 16px; display: flex; gap: 16px; font-size: 12px; }
    .mini-nav a { color: var(--text-secondary); text-decoration: none; padding: 4px 8px; border-radius: 4px; }
    .mini-nav a:hover { background: var(--bg-card); color: var(--text-primary); }
    .mini-nav a.active { color: var(--accent-blue); background: rgba(88,166,255,0.1); }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #21262d;
      --border-color: #30363d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-green: #3fb950;
      --accent-red: #f85149;
      --accent-blue: #58a6ff;
      --accent-yellow: #d29922;
      --accent-purple: #a371f7;
      --accent-orange: #f0883e;
    }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-size: 13px;
      margin: 0;
    }
    .panel-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); }
    .live-dot { width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .summary-bar {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
      background: var(--border-color);
    }
    .summary-item { background: var(--bg-secondary); padding: 12px; text-align: center; }
    .summary-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .summary-value { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .filter-bar {
      background: var(--bg-secondary); padding: 10px 16px;
      display: flex; gap: 8px; border-bottom: 1px solid var(--border-color);
    }
    .filter-btn {
      padding: 5px 12px; border-radius: 4px; font-size: 12px;
      background: var(--bg-card); color: var(--text-secondary);
      border: 1px solid var(--border-color); cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { background: var(--bg-primary); }
    .filter-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
    .signals-list { padding: 12px; }
    .signal-row {
      display: grid;
      grid-template-columns: 70px 70px 80px 60px 80px 100px;
      gap: 12px;
      align-items: center;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .signal-time { font-size: 11px; color: var(--text-muted); }
    .market-tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .market-us { background: rgba(88,166,255,0.2); color: var(--accent-blue); }
    .market-hk { background: rgba(163,113,247,0.2); color: var(--accent-purple); }
    .market-a { background: rgba(248,81,73,0.2); color: var(--accent-red); }
    .market-btc { background: rgba(240,136,62,0.2); color: var(--accent-orange); }
    .signal-code { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .direction-long { color: var(--accent-green); font-weight: 600; }
    .direction-short { color: var(--accent-red); font-weight: 600; }
    .confidence { font-size: 12px; color: var(--text-secondary); }
    .verdict-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .verdict-live { background: rgba(63,185,80,0.2); color: var(--accent-green); }
    .verdict-paper { background: rgba(88,166,255,0.2); color: var(--accent-blue); }
    .verdict-generated { background: rgba(210,153,34,0.2); color: var(--accent-yellow); }
    .verdict-discard { background: rgba(110,118,129,0.2); color: var(--text-muted); }
    .ordered-tag { color: var(--accent-green); font-size: 10px; margin-top: 2px; }
    .loading { text-align: center; color: var(--text-muted); padding: 40px; }
    .header-row { font-size: 10px; color: var(--text-muted); text-transform: uppercase; padding: 8px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); }
  </style>
</head>
<body>
<div class="mini-nav">
  <a href="/">概览</a>
  <a href="/panel-orders.html">持仓</a>
  <a href="/panel-signals.html" class="active">信号</a>
  <a href="/panel-news.html">新闻</a>
  <a href="/panel-system.html">系统</a>
</div>
<div id="panel-root">
  <div class="panel-header">
    <div class="panel-title">MarketPlayer · 信号实时监控</div>
    <div class="live-indicator">
      <span class="live-dot"></span><span>LIVE</span>
      <span id="countdown" style="margin-left: 8px; color: var(--text-muted);">30s</span>
    </div>
  </div>
  <div class="summary-bar">
    <div class="summary-item"><div class="summary-label">总信号</div><div class="summary-value" id="summary-total">--</div></div>
    <div class="summary-item"><div class="summary-label">今日信号</div><div class="summary-value" id="summary-today">--</div></div>
    <div class="summary-item"><div class="summary-label">candidate_paper</div><div class="summary-value" id="summary-paper">--</div></div>
    <div class="summary-item"><div class="summary-label">candidate_live</div><div class="summary-value" id="summary-live">--</div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" data-filter="us" onclick="setFilter('us')">美股</button>
    <button class="filter-btn" data-filter="hk" onclick="setFilter('hk')">港股</button>
    <button class="filter-btn" data-filter="a" onclick="setFilter('a')">A股</button>
    <button class="filter-btn" data-filter="btc" onclick="setFilter('btc')">BTC</button>
  </div>
  <div class="header-row">
    <span style="width:70px;display:inline-block;">时间</span>
    <span style="width:70px;display:inline-block;">市场</span>
    <span style="width:80px;display:inline-block;">代码</span>
    <span style="width:60px;display:inline-block;">方向</span>
    <span style="width:80px;display:inline-block;">置信度</span>
    <span style="width:100px;display:inline-block;">状态</span>
  </div>
  <div class="signals-list" id="signals-list">
    <div class="loading">Loading...</div>
  </div>
</div>
<script>
(function() { if (window.self !== window.top) { document.querySelector(".mini-nav").style.display = "none"; } })();

(function() {
  var filter = 'all';
  var countdown = 30;
  var countdownEl = document.getElementById('countdown');
  var allData = [];
  
  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    render();
  }
  window.setFilter = setFilter;
  
  function fmtDate(iso) {
    if (!iso) return '--';
    var d = new Date(iso);
    return (d.getMonth()+1)+'-'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  }
  
  function marketClass(m) {
    return 'market-' + (m || 'us');
  }
  
  async function load() {
    try {
      var resp = await fetch('/api/dashboard/signals');
      var json = await resp.json();
      if (!json.success) throw new Error(json.error);
      renderData(json.data);
    } catch(e) { 
      console.error(e); 
      document.getElementById('signals-list').innerHTML = '<div class="loading">Error: '+e.message+'</div>';
    }
  }
  
  function renderData(data) {
    allData = data;
    var today = data.filter(function(s) {
      var d = new Date(s.created_at);
      var t = new Date();
      return d.toDateString() === t.toDateString();
    }).length;
    var paper = data.filter(function(s) { return s.status === 'generated'; }).length;
    var live = data.filter(function(s) { return s.status === 'sent'; }).length;
    
    document.getElementById('summary-total').textContent = data.length;
    document.getElementById('summary-today').textContent = today;
    document.getElementById('summary-paper').textContent = paper;
    document.getElementById('summary-live').textContent = live;
    
    render();
  }
  
  function render() {
    var filtered = filter === 'all' ? allData : allData.filter(function(s) { return s.market === filter; });
    
    if (filtered.length === 0) {
      document.getElementById('signals-list').innerHTML = '<div class="loading">No signals</div>';
      return;
    }
    
    var html = '';
    for (var i = 0; i < filtered.length; i++) {
      var s = filtered[i];
      var mkt = s.market || 'us';
      var conf = parseInt(s.confidence) || 0;
      var isLong = s.direction === 'long';
      var status = s.status || 'generated';
      var vClass = status === 'sent' ? 'verdict-live' : (status === 'generated' ? 'verdict-generated' : 'verdict-discard');
      var vText = status === 'sent' ? '已发送' : (status === 'generated' ? '生成中' : status);
      
      html += '<div class="signal-row">' +
        '<div class="signal-time">'+fmtDate(s.created_at)+'</div>' +
        '<div><span class="market-tag '+marketClass(mkt)+'">'+mkt.toUpperCase()+'</span></div>' +
        '<div class="signal-code">'+s.symbol+'</div>' +
        '<div class="'+(isLong?'direction-long':'direction-short')+'">'+(isLong?'↑ long':'↓ short')+'</div>' +
        '<div class="confidence">'+conf+'%</div>' +
        '<div><span class="verdict-badge '+vClass+'">'+vText+'</span>' +
          (s.futu_order_id ? '<div class="ordered-tag">✓ 已下单</div>' : '') +
        '</div>' +
      '</div>';
    }
    document.getElementById('signals-list').innerHTML = html;
  }
  
  setInterval(function() {
    countdown--;
    if (countdown <= 0) { countdown = 30; load(); }
    if (countdownEl) countdownEl.textContent = countdown+'s';
  }, 1000);
  
  load();
})();
</script>
</body>
</html>
